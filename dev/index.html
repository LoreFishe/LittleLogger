  function sessionCategory(s) {
    if (s.category) return s.category;
    if (s.freeform && s.freeformKey) {
      const def = HOME_SECTIONS.find(d => d.freeform && d.freeform.key === s.freeformKey);
      if (def) return def.key;
    }
    if (s.templateKey && data.templates[s.templateKey]) return getTemplateCategory(data.templates[s.templateKey]);
    if (s.exercises && s.exercises[0]) {
      const lib = getLibraryEx(s.exercises[0].exerciseId);

    }

  function getGoals() {
    return (data.settings && data.settings.goals) || DEFAULT_GOALS;

  function startOfWeek(d) {
    const day = d.getDay();
    const diff = (day === 0 ? -6 : 1) - day;
    const monday = new Date(d);
    monday.setDate(d.getDate() + diff);
    monday.setHours(0, 0, 0, 0);
    return monday;
  }

  function countSessionsInRange(category, startMs, endMs) {
    return data.sessions.filter(s => s.timestamp >= startMs && s.timestamp < endMs && sessionCategory(s) === category).length;
  }

  function weekMeetsGoals(weekStart) {
    const weekEnd = new Date(weekStart.getTime() + 7 * 24 * 60 * 60 * 1000);
    const goals = getGoals();
    return Object.keys(goals).every(cat => countSessionsInRange(cat, weekStart.getTime(), weekEnd.getTime()) >= goals[cat]);
  }

  function computeStreak() {
    let weekStart = startOfWeek(new Date());
    weekStart = new Date(weekStart.getTime() - 7 * 24 * 60 * 60 * 1000); // last fully-completed week
    let streak = 0;
    while (weekMeetsGoals(weekStart)) {
      streak++;
      weekStart = new Date(weekStart.getTime() - 7 * 24 * 60 * 60 * 1000);
    }
    return streak;
  }

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);

    } catch (e) {
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      persist();
    }
    plateCalcBar = data.plateCalcBar || '45';
    if (!data.widgets) {
      const typesUsed = new Set();
      Object.values(data.templates || {}).forEach(tpl => {
        (tpl.widgets || ['resttimer']).forEach(t => typesUsed.add(t));
        delete tpl.widgets;
      });
      if (typesUsed.size === 0) typesUsed.add('resttimer');
      data.widgets = Array.from(typesUsed).map(type => ({ id: 'w-' + type + '-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), type }));
      persist();
    }
    if (!data.settings) {
      data.settings = { theme: 'midnight', gymSuggestions: true };
      persist();
    } else if (data.settings.gymSuggestions === undefined) {
      data.settings.gymSuggestions = true;
      persist();
    }
    if (!data.settings.goals) {
      data.settings.goals = DEFAULT_GOALS;
      persist();
    } else {
      // Migrate the old {min,max} range shape down to a single target number.
      let migrated = false;
      Object.keys(data.settings.goals).forEach(cat => {
        const g = data.settings.goals[cat];
        if (g && typeof g === 'object') { data.settings.goals[cat] = g.min || 1; migrated = true; }
      });
      if (migrated) persist();
    }
    if (!data.settings.themeOverrides) {
      data.settings.themeOverrides = {};
      persist();
    }
    if (!data.libraryMigratedV1) {
      DEFAULT_LIBRARY.forEach(def => {

        if (!existing) {
          data.library.push(JSON.parse(JSON.stringify(def)));

          if (!existing.fields && def.fields) existing.fields = def.fields;

  function formatSeconds(sec) {
    sec = Math.max(0, Math.round(sec));
    const m = Math.floor(sec / 60), s = sec % 60;

  const openSwipes = new Set();
  document.addEventListener('pointerdown', e => {
    openSwipes.forEach(sw => {

    });
  }, true);

  function attachSwipe(contentEl, opts) {
    opts = opts || {};
    const reverse = !!opts.reverse;
    let openDist = opts.distance || 80;
    const openThreshold = opts.openThreshold != null ? opts.openThreshold : 1;
    let startX = 0, startY = 0, currentX = 0, dragging = false, open = false, axisLocked = null;
    contentEl.addEventListener('pointerdown', e => {
      if (opts.handleSelector) {
        if (!e.target.closest(opts.handleSelector)) return;
      } else {
        if (e.target.closest('button, input, select, textarea, a, label')) return;
        if (opts.excludeSelector && e.target.closest(opts.excludeSelector)) return;
      }
      startX = e.clientX; startY = e.clientY;
      dragging = true; axisLocked = null;
      contentEl.style.transition = 'none';
      if (opts.fraction) openDist = contentEl.getBoundingClientRect().width * opts.fraction;
      try { contentEl.setPointerCapture(e.pointerId); } catch (err) {}
    });
    contentEl.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if (axisLocked === null && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
        axisLocked = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
      }
      if (axisLocked === 'y') return;
      if (axisLocked === 'x') {
        let val;
        if (reverse) {
          const base = open ? openDist : 0;
          val = Math.max(0, Math.min(openDist, base + dx));
        } else {
          const base = open ? -openDist : 0;
          val = Math.max(-openDist, Math.min(0, base + dx));
        }
        currentX = val;
        contentEl.style.transform = 'translateX(' + val + 'px)';
      }
    });
    const finish = () => {
      if (!dragging) return;
      dragging = false;
      if (axisLocked === 'x') {
        contentEl.style.transition = 'transform 0.2s';
        const shouldOpen = Math.abs(currentX) >= openDist * openThreshold;
        if (shouldOpen) {
          contentEl.style.transform = 'translateX(' + (reverse ? openDist : -openDist) + 'px)';
          open = true;
          openSwipes.add(controller);
        } else {
          contentEl.style.transform = 'translateX(0)';
          open = false;
          openSwipes.delete(controller);
        }
        const suppressNextClick = (e) => { e.stopImmediatePropagation(); e.preventDefault(); };
        contentEl.addEventListener('click', suppressNextClick, { capture: true, once: true });
      }
    };
    contentEl.addEventListener('pointerup', finish);
    contentEl.addEventListener('pointercancel', finish);
    const controller = {
      wrapEl: opts.wrapEl || contentEl,
      isOpen: () => open,
      close: () => {
        if (!open) return;
        open = false;
        contentEl.style.transition = 'transform 0.2s';
        contentEl.style.transform = 'translateX(0)';
        openSwipes.delete(controller);
      }
    };
    return controller;
  }

  function attachNumberSwipe(fieldEl, opts) {
    const input = fieldEl.querySelector('input');
    const step = opts.step;
    const pxPerStep = opts.pxPerStep || 26;
    let startX = 0, startY = 0, startVal = 0, dragging = false, axisLocked = null, appliedSteps = 0;

    fieldEl.addEventListener('pointerdown', e => {
      startX = e.clientX; startY = e.clientY;
      startVal = parseFloat(input.value) || 0;
      dragging = true; axisLocked = null; appliedSteps = 0;
      try { fieldEl.setPointerCapture(e.pointerId); } catch (err) {}
    });
    fieldEl.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      if (axisLocked === null && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
        axisLocked = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
        if (axisLocked === 'x') {
          input.blur();
          fieldEl.classList.add('wt-field-dragging');
        }
      }
      if (axisLocked !== 'x') return;
      e.preventDefault();
      const steps = Math.round(dx / pxPerStep);
      if (steps !== appliedSteps) {
        appliedSteps = steps;
        let newVal = Math.max(0, startVal + steps * step);
        newVal = Math.round(newVal * 100) / 100;
        input.value = newVal;
        opts.onChange(newVal);
      }
    });
    const finish = () => {
      if (!dragging) return;
      dragging = false;
      fieldEl.classList.remove('wt-field-dragging');
      if (axisLocked === 'x') {
        const suppress = (ev) => { ev.stopImmediatePropagation(); ev.preventDefault(); };
        input.addEventListener('click', suppress, { capture: true, once: true });
      }
      axisLocked = null;
    };
    fieldEl.addEventListener('pointerup', finish);
    fieldEl.addEventListener('pointercancel', finish);
  }

  function escapeHtml(str) {
    const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
  }

  function getLibraryEx(id) { return data.library.find(e => e.id === id); }

  function setHasData(ex, s) {
    const type = ex.type || 'weight';
    if (type === 'checkbox') return !!s.checked;
    if (type === 'timed') return !!s.seconds;
    if (type === 'bodyweight') return !!s.reps;
    if (type === 'custom') return (ex.fields || []).some(f => !!fieldValueOf(f, s));
    return !!s.weight;
  }

  function hasLoggedToday(matcher) {
    const todayStr = new Date().toDateString();
    return data.sessions.some(s => new Date(s.timestamp).toDateString() === todayStr && matcher(s));
  }

  function getLastLoggedExercise(exerciseId) {
    const past = data.sessions
      .filter(s => s.exercises.some(e => e.exerciseId === exerciseId && e.sets.some(x => setHasData(e, x))))
      .sort((a,b) => b.timestamp - a.timestamp);
    if (past.length === 0) return null;
    return past[0].exercises.find(e => e.exerciseId === exerciseId);
  }

  function findLastLoggedDisplay(exerciseId) {
    const lastEx = getLastLoggedExercise(exerciseId);
    if (!lastEx) return null;
    const type = lastEx.type || 'weight';
    if (type === 'checkbox') {
      return lastEx.sets.some(s => s.checked) ? 'done last time' : null;
    }
    if (type === 'timed') {
      const best = lastEx.sets.filter(s => s.seconds).sort((a,b) => (b.seconds||0)-(a.seconds||0))[0];
      return best ? formatSeconds(best.seconds) : null;
    }
    if (type === 'bodyweight') {
      const best = lastEx.sets.filter(s => s.reps).sort((a,b) => (b.reps||0)-(a.reps||0))[0];
      return best ? best.reps + ' reps' : null;
    }
    if (type === 'custom') {
      const fields = lastEx.fields || [];
      const withData = lastEx.sets.filter(s => setHasData(lastEx, s));
      const best = withData[withData.length - 1];
      if (!best) return null;
      const parts = fields.map(f => formatFieldValue(f, best)).filter(Boolean);
      return parts.length ? parts.join(' · ') : null;
    }
    const best = lastEx.sets.filter(s => s.weight).sort((a,b) => (b.weight||0)-(a.weight||0))[0];
    return best ? best.weight + 'lb x' + best.reps : null;
  }

  function makeEmptySets(count, defaults) {
    const d = defaults || {};
    return Array.from({ length: count }, () => ({
      weight: d.weight || '', reps: d.reps || '', seconds: d.seconds || '',
      distance: d.distance || '', checked: false, intensity: d.intensity || ''
    }));
  }

  function rememberExerciseDefault(exerciseId, field, value) {
    const lib = getLibraryEx(exerciseId);
    if (!lib) return;
    if (!lib.defaults) lib.defaults = {};
    lib.defaults[field] = value;
  }

  function groupKeyFor(type, s) {
    if (type === 'timed') return String(s.seconds);
    if (type === 'bodyweight') return String(s.reps);
    return s.weight + '|' + s.reps;
  }

  const forceNewGroupBefore = new WeakSet();

  function deriveSetGroups(type, sets) {
    const groups = [];
    sets.forEach((s, i) => {
      const last = groups[groups.length - 1];
      const sameAsLast = last && !forceNewGroupBefore.has(s) && groupKeyFor(type, s) === groupKeyFor(type, sets[last.start]);
      if (sameAsLast) {
        last.count++;
      } else {
        groups.push({ start: i, count: 1 });
      }
    });
    return groups;
  }

  function buildGroupRow(ex, type, group, isFirst) {
    const row = document.createElement('div');
    row.className = 'wt-simple-row';
    const rep = ex.sets[group.start];

    function applyToGroup(mutator) {
      for (let i = group.start; i < group.start + group.count; i++) mutator(ex.sets[i]);
      scheduleSave();
    }

    // Only the exercise's default (first) group updates the remembered default —
    // a deliberately different second group (e.g. a drop set) shouldn't overwrite it.
    function rememberIfFirst(field, value) {
      if (isFirst) rememberExerciseDefault(ex.exerciseId, field, value);
    }

    if (type === 'timed') {
      row.style.gridTemplateColumns = '1fr 1fr 1.3fr 28px';
      const totalSec = rep.seconds ? Math.max(0, Math.round(parseFloat(rep.seconds) || 0)) : null;
      const minVal = totalSec !== null ? Math.floor(totalSec / 60) : '';
      const secVal = totalSec !== null ? totalSec % 60 : '';
      row.innerHTML = `<div class="wt-field"><input type="number" inputmode="numeric" placeholder="0" value="${minVal}" data-role="min" /><span class="wt-unit">min</span></div>
        <div class="wt-field"><input type="number" inputmode="numeric" placeholder="0" value="${secVal}" data-role="sec" /><span class="wt-unit">sec</span></div>`;
      const minInput = row.querySelector('[data-role="min"]');
      const secInput = row.querySelector('[data-role="sec"]');
      const commit = () => {
        const m = parseInt(minInput.value) || 0;
        const sc = parseInt(secInput.value) || 0;
        applyToGroup(st => { st.seconds = m * 60 + sc; });
        rememberIfFirst('seconds', m * 60 + sc);
      };
      minInput.addEventListener('input', commit);
      secInput.addEventListener('input', commit);
      const timeFields = row.querySelectorAll('.wt-field');
      attachNumberSwipe(timeFields[0], { step: 1, onChange: (v) => { const sec = (parseInt(v) || 0) * 60 + (parseInt(secInput.value) || 0); applyToGroup(st => { st.seconds = sec; }); rememberIfFirst('seconds', sec); } });
      attachNumberSwipe(timeFields[1], { step: 1, onChange: (v) => { const sec = (parseInt(minInput.value) || 0) * 60 + (parseInt(v) || 0); applyToGroup(st => { st.seconds = sec; }); rememberIfFirst('seconds', sec); } });
    } else if (type === 'bodyweight') {
      row.style.gridTemplateColumns = '1fr 1.3fr 28px';
      row.innerHTML = `<div class="wt-field"><input type="number" inputmode="numeric" placeholder="0" value="${rep.reps || ''}" data-role="reps" /><span class="wt-unit">reps</span></div>`;
      row.querySelector('[data-role="reps"]').addEventListener('input', (e) => { applyToGroup(st => { st.reps = e.target.value; }); rememberIfFirst('reps', e.target.value); });
      attachNumberSwipe(row.querySelector('.wt-field'), { step: 1, onChange: (v) => { applyToGroup(st => { st.reps = v; }); rememberIfFirst('reps', v); } });
    } else {
      row.style.gridTemplateColumns = '1fr 1fr 1.3fr 28px';
      row.innerHTML = `<div class="wt-field"><input type="number" inputmode="decimal" placeholder="0" value="${rep.weight || ''}" data-role="weight" /><span class="wt-unit">lbs</span></div>
        <div class="wt-field"><input type="number" inputmode="numeric" placeholder="0" value="${rep.reps || ''}" data-role="reps" /><span class="wt-unit">reps</span></div>`;
      row.querySelector('[data-role="weight"]').addEventListener('input', (e) => { applyToGroup(st => { st.weight = e.target.value; }); rememberIfFirst('weight', e.target.value); });
      row.querySelector('[data-role="reps"]').addEventListener('input', (e) => { applyToGroup(st => { st.reps = e.target.value; }); rememberIfFirst('reps', e.target.value); });
      const fields = row.querySelectorAll('.wt-field');
      attachNumberSwipe(fields[0], { step: 2.5, onChange: (v) => { applyToGroup(st => { st.weight = v; }); rememberIfFirst('weight', v); } });
      attachNumberSwipe(fields[1], { step: 1, onChange: (v) => { applyToGroup(st => { st.reps = v; }); rememberIfFirst('reps', v); } });
    }

    const stepper = document.createElement('div');
    stepper.className = 'wt-set-stepper';
    stepper.innerHTML = `<button type="button" class="wt-step-minus">−</button><span class="wt-step-count">${group.count}</span><button type="button" class="wt-step-plus">+</button>`;
    stepper.querySelector('.wt-step-minus').onclick = () => {
      if (group.count <= 1) ex.sets.splice(group.start, 1);
      else ex.sets.splice(group.start + group.count - 1, 1);
      scheduleSave();
      render();
    };
    stepper.querySelector('.wt-step-plus').onclick = () => {
      if (group.count >= 10) return;
      ex.sets.splice(group.start + group.count, 0, { ...ex.sets[group.start] });
      scheduleSave();
      render();
    };
    row.appendChild(stepper);

    if (!isFirst) {
      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'wt-set-remove';
      removeBtn.textContent = '×';
      removeBtn.title = 'Remove';
      removeBtn.onclick = () => {
        ex.sets.splice(group.start, group.count);
        scheduleSave();
        render();
      };
      row.appendChild(removeBtn);
    }

    return row;
  }

  function buildSetGroups(ex, type) {

  function saveSession() {
    const draft = data.draft;
    const loggedExercises = draft.exercises.filter(e => e.sets.some(s => setHasData(e, s)));
    if (loggedExercises.length === 0) {
      showToast('Nothing logged — add a value first');
      return;
    }
    const sessionRecord = {
      id: 'sess-' + Date.now(),
      templateKey: draft.templateKey,
      templateName: draft.templateName,
      timestamp: draft.startedAt,
      notes: draft.notes || '',
      exercises: loggedExercises
    };
    if (draft.freeform) {
      sessionRecord.freeform = true;
      sessionRecord.freeformKey = draft.freeformKey;
    }
    data.sessions.push(sessionRecord);
    data.draft = null;
    cancelRestTimer();
    pickerOpenFor = null;
    creatingNew = false;
    creatingFromCatalog = false;
    homeOpenKey = null;
    scheduleSave();
    showToast('Session saved');

      name: lib.name,
      type,
      sets: type === 'checkbox' ? [{ weight: '', reps: '', seconds: '', distance: '', checked: false, intensity: '' }] : makeEmptySets(lib.sets, lib.defaults)

    if (type === 'custom') ex.fields = lib.fields;
    data.draft.exercises.push(ex);

    creatingFromCatalog = false;

  function addNewLibraryExercise(fields) {
    const id = fields.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') + '-' + Date.now().toString(36);
    const newEx = { id, name: fields.name, sets: fields.sets, repRange: fields.repRange, type: fields.type || 'weight' };
    if (fields.type === 'custom') newEx.fields = fields.fields;
    if (fields.category) newEx.category = fields.category;
    if (fields.load) newEx.load = fields.load;
    data.library.push(newEx);

  function addFromCatalog(categoryKey, exerciseIdx) {
    const cat = PRESET_EXERCISE_CATALOG[categoryKey];
    const preset = cat && cat.exercises[exerciseIdx];
    if (!preset) return null;
    const fields = {

  function buildWheelPicker(items, opts) {
    opts = opts || {};
    const itemHeight = opts.itemHeight || 34;
    const visibleCount = opts.visibleCount || 3;
    const containerHeight = itemHeight * visibleCount;
    const pad = (containerHeight - itemHeight) / 2;

    const wrap = document.createElement('div');
    wrap.className = 'wt-wheel';
    wrap.style.height = containerHeight + 'px';

    const highlight = document.createElement('div');
    highlight.className = 'wt-wheel-highlight';
    highlight.style.height = itemHeight + 'px';
    wrap.appendChild(highlight);

    const scroller = document.createElement('div');
    scroller.className = 'wt-wheel-scroller';
    scroller.style.paddingTop = pad + 'px';
    scroller.style.paddingBottom = pad + 'px';
    wrap.appendChild(scroller);

    let currentIndex = Math.max(0, Math.min(items.length - 1, opts.selectedIndex || 0));
    let settleTimeout = null;
    let suppressNextSettle = false;

    items.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'wt-wheel-item';
      el.style.height = itemHeight + 'px';
      el.style.lineHeight = itemHeight + 'px';
      el.textContent = item.label;
      // Instant (not smooth) scroll on tap: a smooth animated scrollTo fights the
      // CSS scroll-snap on this same element and can settle back on the wrong item.
      el.onclick = () => scrollToIndex(i, false);
      scroller.appendChild(el);
    });

    function updateActiveClasses() {
      Array.from(scroller.children).forEach((el, i) => el.classList.toggle('active', i === currentIndex));
    }

    function scrollToIndex(i, smooth) {
      currentIndex = Math.max(0, Math.min(items.length - 1, i));
      suppressNextSettle = true;
      scroller.scrollTo({ top: currentIndex * itemHeight, behavior: smooth ? 'smooth' : 'auto' });
      updateActiveClasses();
      if (opts.onChange) opts.onChange(items[currentIndex].value, currentIndex);
    }

    scroller.addEventListener('scroll', () => {
      clearTimeout(settleTimeout);
      settleTimeout = setTimeout(() => {
        if (suppressNextSettle) {
          suppressNextSettle = false;
          const expected = currentIndex * itemHeight;
          if (Math.abs(scroller.scrollTop - expected) > 1) scroller.scrollTop = expected;
          return;
        }
        const idx = Math.max(0, Math.min(items.length - 1, Math.round(scroller.scrollTop / itemHeight)));
        // Only notify on an actual change — a settle that lands back on the same
        // index (e.g. the initial mount scroll) must not re-fire onChange, since
        // callers that re-render on change would otherwise loop forever.
        if (idx === currentIndex) { updateActiveClasses(); return; }
        currentIndex = idx;
        updateActiveClasses();
        if (opts.onChange) opts.onChange(items[currentIndex].value, currentIndex);
      }, 120);
    });

    requestAnimationFrame(() => {
      suppressNextSettle = true;
      scroller.scrollTop = currentIndex * itemHeight;
      updateActiveClasses();
    });

    wrap.getValue = () => items[currentIndex] ? items[currentIndex].value : null;
    return wrap;
  }

  function buildCatalogPicker(onAdd, onCancel) {
    const wrap = document.createElement('div');

    function buildExWheel(catKey, selectedIndex) {

      exWheel = buildWheelPicker(cat.exercises.map((e, i) => ({ label: e.name, value: i })), { selectedIndex: selectedIndex || 0 });

    const catWheel = buildWheelPicker(

  // ---------- Home screen: quick-log + freeform sessions ----------

  function logQuickExercise(libId, values) {
    const lib = getLibraryEx(libId);
    const set = { weight: '', reps: '', seconds: '', distance: '', checked: false, intensity: '' };
    (lib.fields || []).forEach(f => {
      if (f === 'time') set.seconds = values.seconds || '';
      if (f === 'distance') set.distance = values.distance || '';
      if (f === 'intensity') set.intensity = values.intensity || '';
      if (f === 'weight') set.weight = values.weight || '';
      if (f === 'reps') set.reps = values.reps || '';
    });
    const ex = { exerciseId: libId, name: lib.name, type: lib.type, fields: lib.fields, sets: [set] };
    if (!setHasData(ex, set)) { showToast('Nothing logged — add a value first'); return false; }
    data.sessions.push({ id: 'sess-' + Date.now(), templateKey: null, templateName: lib.name, timestamp: Date.now(), notes: '', exercises: [ex] });
    persist();
    showToast('Logged ' + lib.name);
    return true;
  }

  function startFreeformDraft(freeformKey, label, category) {
    if (data.draft) { showToast('Finish or discard your current session first'); return false; }
    data.draft = { templateKey: null, templateName: label, freeform: true, freeformKey, category, startedAt: Date.now(), notes: '', exercises: [] };
    scheduleSave();
    return true;
  }

  function buildQuickLogPanel(lib) {
    const wrap = document.createElement('div');
    wrap.className = 'wt-card';

    const fields = lib.fields || [];
    const valueFields = fields.filter(f => f !== 'intensity');
    let colCount = 0;
    valueFields.forEach(f => { colCount += f === 'time' ? 2 : 1; });

    const row = document.createElement('div');
    row.className = 'wt-set-row';
    row.style.gridTemplateColumns = Array(colCount).fill('1fr').join(' ');

    const defaults = lib.defaults || {};
    const defMin = defaults.seconds ? Math.floor((parseInt(defaults.seconds) || 0) / 60) : '';
    const defSec = defaults.seconds ? (parseInt(defaults.seconds) || 0) % 60 : '';

    let html = '';
    valueFields.forEach(f => {
      if (f === 'time') {
        html += `<div class="wt-field"><input type="number" inputmode="numeric" placeholder="0" value="${defMin}" data-role="min" /><span class="wt-unit">min</span></div>`;
        html += `<div class="wt-field"><input type="number" inputmode="numeric" placeholder="0" value="${defSec}" data-role="sec" /><span class="wt-unit">sec</span></div>`;
      } else if (f === 'distance') {
        html += `<div class="wt-field"><input type="number" inputmode="decimal" placeholder="0.0" value="${defaults.distance || ''}" data-role="distance" /><span class="wt-unit">mi</span></div>`;
      } else if (f === 'weight') {
        html += `<div class="wt-field"><input type="number" inputmode="decimal" placeholder="0" value="${defaults.weight || ''}" data-role="weight" /><span class="wt-unit">lbs</span></div>`;
      } else if (f === 'reps') {
        html += `<div class="wt-field"><input type="number" inputmode="numeric" placeholder="0" value="${defaults.reps || ''}" data-role="reps" /><span class="wt-unit">reps</span></div>`;
      }
    });
    row.innerHTML = html;
    wrap.appendChild(row);

    let intensityVal = defaults.intensity || '';
    let intensityField = null;
    if (fields.includes('intensity')) {
      intensityField = document.createElement('div');
      intensityField.className = 'wt-intensity-field';
      intensityField.style.marginTop = '8px';
      intensityField.innerHTML = [1, 2, 3, 4, 5].map(n => `<button type="button" data-val="${n}" class="wt-intensity-btn${String(n) === String(intensityVal) ? ' active' : ''}">${n}</button>`).join('')
        + '<span class="wt-intensity-label">Intensity 1–5</span>';
      wrap.appendChild(intensityField);
      intensityField.querySelectorAll('button').forEach(btn => {
        btn.onclick = () => {
          intensityVal = btn.dataset.val;
          intensityField.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        };
      });
    }

    const actions = document.createElement('div');
    actions.className = 'wt-actions-row';
    actions.style.marginTop = '10px';
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'wt-btn wt-btn-ghost';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.onclick = () => { homeOpenKey = null; render(); };
    const saveBtn = document.createElement('button');
    saveBtn.className = 'wt-btn wt-btn-primary';
    saveBtn.textContent = 'Save';
    saveBtn.onclick = () => {
      const values = { intensity: intensityVal };
      const minInput = row.querySelector('[data-role="min"]');
      const secInput = row.querySelector('[data-role="sec"]');
      if (minInput) values.seconds = (parseInt(minInput.value) || 0) * 60 + (parseInt(secInput.value) || 0);
      const distInput = row.querySelector('[data-role="distance"]');
      if (distInput) values.distance = distInput.value;
      const weightInput = row.querySelector('[data-role="weight"]');
      if (weightInput) values.weight = weightInput.value;
      const repsInput = row.querySelector('[data-role="reps"]');
      if (repsInput) values.reps = repsInput.value;
      if (logQuickExercise(lib.id, values)) {
        Object.keys(values).forEach(f => { if (values[f] !== '' && values[f] != null) rememberExerciseDefault(lib.id, f, values[f]); });
        homeOpenKey = null; render();
      }
    };
    actions.appendChild(cancelBtn);
    actions.appendChild(saveBtn);
    wrap.appendChild(actions);

    return wrap;
  }

  function updateLibraryExercise(id, fields) {

    ex.name = fields.name;

    ex.sets = fields.sets;
    ex.repRange = fields.repRange;

  function startRestTimer(seconds) {
    clearInterval(restTimerInterval);
    restTimerSeconds = seconds;
    restTimerEndAt = Date.now() + seconds * 1000;
    render();
    restTimerInterval = setInterval(tickRestTimer, 250);
  }

  function tickRestTimer() {
    if (!restTimerEndAt) return;
    const remaining = Math.max(0, Math.round((restTimerEndAt - Date.now()) / 1000));
    const el = document.getElementById('wt-rest-remaining');
    if (el) el.textContent = formatSeconds(remaining);
    const bar = document.getElementById('wt-rest-bar');
    if (bar) bar.style.width = Math.max(0, Math.min(100, (remaining / restTimerSeconds) * 100)) + '%';
    if (remaining <= 0) {
      clearInterval(restTimerInterval);
      restTimerInterval = null;
      restTimerEndAt = null;
      try { if (navigator.vibrate) navigator.vibrate([200,100,200]); } catch (e) {}
      showToast('Rest complete');
      render();
    }
  }

  function cancelRestTimer() {
    clearInterval(restTimerInterval);
    restTimerInterval = null;
    restTimerEndAt = null;
  }

  function render() {
    openSwipes.clear();

    root.classList.toggle('has-bottomnav', TAB_VIEWS.includes(view));
    root.appendChild(buildHeader());
    if (view === 'summary') root.appendChild(buildSummaryPage());
    else if (view === 'home') root.appendChild(buildHome());
    else if (view === 'session') root.appendChild(buildSession());
    else if (view === 'historyhub') root.appendChild(buildHistoryHub());
    else if (view === 'settingshub') root.appendChild(buildSettingsHub());
    else if (view === 'widgets') root.appendChild(buildWidgetsScreen());
    else if (view === 'fatigue') root.appendChild(buildFatiguePage());
    if (view !== 'widgets' && view !== 'settingshub') root.appendChild(buildWidgetsFab());
    if (TAB_VIEWS.includes(view)) root.appendChild(buildBottomNav());
  }

        data.widgets.push({ id: 'w-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), type: 'intervalpreset', config: { name, work, rest, rounds } });
        addWidgetPickerOpen = false;
        creatingWidgetType = null;
        scheduleSave();
        render();
      };
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'wt-btn wt-btn-ghost';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.onclick = () => { creatingWidgetType = null; render(); };
      actions.appendChild(addBtn);
      actions.appendChild(cancelBtn);
      panel.appendChild(actions);
      return panel;
    }

    panel.className = 'wt-card';
    const existingTypes = new Set(data.widgets.map(w => w.type));
    const singletonTypes = Object.keys(WIDGET_TYPE_DEFS).filter(k => !WIDGET_TYPE_DEFS[k].instancePerConfig);
    const availableSingletons = singletonTypes.filter(k => !existingTypes.has(k));

    availableSingletons.forEach(type => {
      const item = document.createElement('div');
      item.className = 'wt-picker-item';
      item.innerHTML = `<div class="wt-picker-name">${escapeHtml(WIDGET_TYPE_DEFS[type].label)}</div>`;
      const addBtn = document.createElement('button');
      addBtn.className = 'wt-btn wt-btn-primary wt-btn-sm';
      addBtn.textContent = 'Add';
      addBtn.onclick = () => {
        data.widgets.push({ id: 'w-' + type + '-' + Date.now().toString(36), type });
        addWidgetPickerOpen = false;
        scheduleSave();
        render();
      };
      item.appendChild(addBtn);
      panel.appendChild(item);
    });

    ['quicktimer', 'intervalpreset'].forEach(type => {
      const item = document.createElement('div');
      item.className = 'wt-picker-item';
      item.innerHTML = `<div class="wt-picker-name">${escapeHtml(WIDGET_TYPE_DEFS[type].label)}</div>`;
      const addBtn = document.createElement('button');
      addBtn.className = 'wt-btn wt-btn-primary wt-btn-sm';
      addBtn.textContent = 'Add';
      addBtn.onclick = () => { creatingWidgetType = type; render(); };
      item.appendChild(addBtn);
      panel.appendChild(item);
    });

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'wt-btn wt-btn-ghost wt-btn-full';
    cancelBtn.style.marginTop = '10px';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.onclick = () => { addWidgetPickerOpen = false; render(); };
    panel.appendChild(cancelBtn);

    return panel;
  }

  const HOME_SECTIONS = [

  function homeSectionEntries(category) {
    return data.library.filter(e => (e.category || 'strength') === category);
  }

  function homeSectionTemplates(category) {

  }

  function buildHomeSection(def) {
    const section = document.createElement('div');
    section.className = 'wt-home-section';
    section.dataset.section = def.key;

    const head = document.createElement('div');
    head.className = 'wt-home-section-head';
    head.innerHTML = `<h2>${escapeHtml(def.title)}</h2><span class="wt-home-section-hint">${escapeHtml(def.hint)}</span>`;
    section.appendChild(head);

    const chipRow = document.createElement('div');
    chipRow.className = 'wt-home-chip-row';

    // Strength doesn't get individual exercise quick-log chips — those are logged
    // via Blank Workout's add-exercise picker or a template, not one-tap here.
    const quickLogEntries = def.key === 'strength' ? [] : homeSectionEntries(def.key);
    quickLogEntries.forEach(lib => {
      const key = def.key + ':' + lib.id;
      const done = hasLoggedToday(s => s.exercises.some(e => e.exerciseId === lib.id && e.sets.some(x => setHasData(e, x))));
      const chip = document.createElement('button');
      chip.className = 'wt-home-chip' + (done ? ' done' : '') + (homeOpenKey === key ? ' expanded' : '');
      chip.innerHTML = `<span class="wt-home-chip-check">✓</span><span class="wt-home-chip-label">${escapeHtml(lib.name)}</span>`;
      chip.onclick = () => { homeOpenKey = (homeOpenKey === key) ? null : key; render(); };
      chipRow.appendChild(chip);
    });

    if (def.freeform) {
      const fkey = def.key + ':' + def.freeform.key;
      const done = hasLoggedToday(s => s.freeformKey === def.freeform.key);
      const inProgress = !!(data.draft && data.draft.freeform && data.draft.freeformKey === def.freeform.key);
      const chip = document.createElement('button');
      chip.className = 'wt-home-chip session' + (done ? ' done' : '') + (homeOpenKey === fkey ? ' expanded' : '') + (inProgress ? ' in-progress' : '');
      chip.innerHTML = `<span class="wt-home-chip-check">✓</span><span class="wt-home-chip-label">${escapeHtml(def.freeform.label)}</span>`;
      chip.onclick = () => {
        if (homeOpenKey === fkey) { homeOpenKey = null; render(); return; }
        if (!data.draft) {
          if (!startFreeformDraft(def.freeform.key, def.freeform.label, def.key)) return;
        } else if (!(data.draft.freeform && data.draft.freeformKey === def.freeform.key)) {
          showToast('Finish or discard your current session first');
          return;
        }
        homeOpenKey = fkey;
        render();
      };
      chipRow.appendChild(chip);
    }

    homeSectionTemplates(def.key).forEach(tplKey => {
      const tpl = data.templates[tplKey];
      const tplOpenKey = def.key + ':tpl:' + tplKey;
      const done = hasLoggedToday(s => s.templateKey === tplKey);
      const inProgress = !!(data.draft && !data.draft.freeform && data.draft.templateKey === tplKey);
      const chip = document.createElement('button');
      chip.className = 'wt-home-chip session' + (done ? ' done' : '') + (homeOpenKey === tplOpenKey ? ' expanded' : '') + (inProgress ? ' in-progress' : '');
      chip.style.setProperty('--hs-color', getTemplateColor(tpl));
      chip.innerHTML = `<span class="wt-home-chip-check">✓</span><span class="wt-home-chip-label">${escapeHtml(tpl.name)}</span>`;
      chip.onclick = () => {
        if (homeOpenKey === tplOpenKey) { homeOpenKey = null; render(); return; }
        if (!data.draft) {
          if (!startSession(tplKey)) return;
        } else if (!(!data.draft.freeform && data.draft.templateKey === tplKey)) {
          showToast('Finish or discard your current session first');
          return;
        }
        homeOpenKey = tplOpenKey;
        render();
      };
      chipRow.appendChild(chip);
    });

    const addKey = def.key + ':addnew';
    const addChip = document.createElement('button');
    addChip.className = 'wt-home-chip add';
    addChip.innerHTML = `<span class="wt-home-chip-label">+ Add</span>`;
    addChip.onclick = () => {
      if (def.key === 'strength') { view = 'settingshub'; settingsSubTab = 'templates'; render(); return; }
      homeOpenKey = (homeOpenKey === addKey) ? null : addKey;
      render();
    };
    chipRow.appendChild(addChip);

    section.appendChild(chipRow);

    if (homeOpenKey && homeOpenKey.indexOf(def.key + ':') === 0) {
      const subKey = homeOpenKey.slice(def.key.length + 1);
      const panel = document.createElement('div');
      panel.className = 'wt-home-panel';
      if (subKey === 'addnew') {
        panel.appendChild(buildNewExerciseForm(
          (fields) => {
            addNewLibraryExercise(Object.assign({}, fields, { category: def.key }));
            homeOpenKey = null;
            scheduleSave();
            render();
          },
          () => { homeOpenKey = null; render(); },
          { initial: { name: '', type: 'custom', sets: 1, repRange: '' }, saveLabel: 'Add' }
        ));
      } else if (subKey.indexOf('tpl:') === 0) {
        const tplKey = subKey.slice(4);
        if (data.draft && !data.draft.freeform && data.draft.templateKey === tplKey) {
          const tpl = data.templates[tplKey];
          panel.appendChild(buildDraftInlinePanel(data.draft, tpl ? getTemplateColor(tpl) : 'var(--accent)'));
        }
      } else {
        const lib = getLibraryEx(subKey);
        if (lib) {
          panel.appendChild(buildQuickLogPanel(lib));
        } else if (data.draft && data.draft.freeform && data.draft.freeformKey === subKey) {
          panel.appendChild(buildDraftInlinePanel(data.draft));
        }
      }
      section.appendChild(panel);
    }

    return section;
  }

  function buildFatiguePage() {
    const wrap = document.createElement('div');
    const back = document.createElement('button');
    back.className = 'wt-back-btn';
    back.textContent = '← Back';
    back.onclick = () => { view = 'summary'; render(); };
    wrap.appendChild(back);

    const title = document.createElement('div');
    title.className = 'wt-manage-section-title';
    title.textContent = 'Muscle Fatigue';
    wrap.appendChild(title);

    const hint = document.createElement('div');
    hint.className = 'wt-sub';
    hint.style.marginBottom = '16px';
    hint.textContent = 'Recent training load per muscle group from the last ~7 days, weighted toward the most recent sessions. This is what feeds Gym Suggestions.';
    wrap.appendChild(hint);

    const recentLoad = computeRecentLoad();
    const entries = BUCKETS.filter(b => b !== 'cardio').map(b => ({ bucket: b, val: recentLoad[b] || 0 })).sort((a, b) => b.val - a.val);
    const maxVal = Math.max(...entries.map(e => e.val), 0.0001);

    if (entries.every(e => e.val === 0)) {
      const empty = document.createElement('div');
      empty.className = 'wt-empty';
      empty.textContent = 'No recent training load yet — log a few tagged exercises to see this fill in.';
      wrap.appendChild(empty);
      return wrap;
    }

    entries.forEach(({ bucket, val }) => {
      const pct = Math.round((val / maxVal) * 100);
      const row = document.createElement('div');
      row.className = 'wt-fatigue-row';
      row.innerHTML = `<span class="wt-fatigue-label">${escapeHtml(bucket)}</span>
        <div class="wt-fatigue-track"><div class="wt-fatigue-fill" style="width:${pct}%"></div></div>
        <span class="wt-fatigue-val">${pct}%</span>`;
      wrap.appendChild(row);
    });

    return wrap;
  }

  function buildSummaryPage() {
    const wrap = document.createElement('div');

    // Streak
    const streak = computeStreak();
    const streakCard = document.createElement('div');
    streakCard.className = 'wt-summary-card';
    streakCard.innerHTML = `<div class="wt-streak-row">
        <span class="wt-streak-num">${streak}</span>
        <span class="wt-streak-label">${streak === 1 ? 'week' : 'weeks'} hitting your goals${streak === 0 ? ' — get one going this week' : ' in a row'}</span>
      </div>`;
    wrap.appendChild(streakCard);

    // This week's goal progress
    const goals = getGoals();
    const weekStart = startOfWeek(new Date()).getTime();
    const goalsCard = document.createElement('div');
    goalsCard.className = 'wt-summary-card';
    goalsCard.innerHTML = `<div class="wt-summary-card-title">This Week</div>`;
    HOME_SECTIONS.forEach(def => {
      const goal = goals[def.key];
      if (goal == null) return;
      const count = countSessionsInRange(def.key, weekStart, Date.now() + 1);
      const met = count >= goal;
      const row = document.createElement('div');
      row.className = 'wt-goal-row';
      row.innerHTML = `<span class="wt-goal-row-label">${escapeHtml(def.title)}</span>
        <span class="wt-goal-pill${met ? ' met' : ''}">${count} / ${goal}</span>`;
      goalsCard.appendChild(row);
    });
    wrap.appendChild(goalsCard);

    // Last 30 days stats
    const monthAgo = Date.now() - 30 * 24 * 60 * 60 * 1000;
    const monthSessions = data.sessions.filter(s => s.timestamp >= monthAgo);
    const statsCard = document.createElement('div');
    statsCard.className = 'wt-summary-card';
    statsCard.innerHTML = `<div class="wt-summary-card-title">Last 30 Days</div>`;
    const statRow = document.createElement('div');
    statRow.className = 'wt-summary-stat-row';
    HOME_SECTIONS.concat([{ key: 'total', title: 'Total' }]).forEach(def => {
      const count = def.key === 'total' ? monthSessions.length : monthSessions.filter(s => sessionCategory(s) === def.key).length;
      const stat = document.createElement('div');
      stat.className = 'wt-summary-stat';
      stat.innerHTML = `<div class="wt-summary-stat-num">${count}</div><div class="wt-summary-stat-label">${escapeHtml(def.title)}</div>`;
      statRow.appendChild(stat);
    });
    statsCard.appendChild(statRow);
    wrap.appendChild(statsCard);

    // Mini fatigue snapshot
    const recentLoad = computeRecentLoad();
    const fatigueEntries = BUCKETS.filter(b => b !== 'cardio').map(b => ({ bucket: b, val: recentLoad[b] || 0 })).sort((a, b) => b.val - a.val).slice(0, 4);
    const maxFatigue = Math.max(...fatigueEntries.map(e => e.val), 0.0001);
    if (fatigueEntries.some(e => e.val > 0)) {
      const fatigueCard = document.createElement('div');
      fatigueCard.className = 'wt-summary-card';
      fatigueCard.innerHTML = `<div class="wt-summary-card-title">Muscle Fatigue</div>`;
      fatigueEntries.forEach(({ bucket, val }) => {
        const pct = Math.round((val / maxFatigue) * 100);
        const row = document.createElement('div');
        row.className = 'wt-fatigue-row';
        row.innerHTML = `<span class="wt-fatigue-label">${escapeHtml(bucket)}</span>
          <div class="wt-fatigue-track"><div class="wt-fatigue-fill" style="width:${pct}%"></div></div>
          <span class="wt-fatigue-val">${pct}%</span>`;
        fatigueCard.appendChild(row);
      });
      const seeAll = document.createElement('button');
      seeAll.className = 'wt-btn wt-btn-ghost wt-btn-sm';
      seeAll.style.marginTop = '6px';
      seeAll.textContent = 'See full breakdown →';
      seeAll.onclick = () => { view = 'fatigue'; render(); };
      fatigueCard.appendChild(seeAll);
      wrap.appendChild(fatigueCard);
    }

    // Recent sessions
    const recentCard = document.createElement('div');
    recentCard.className = 'wt-summary-card';
    recentCard.innerHTML = `<div class="wt-summary-card-title">Recent Sessions</div>`;
    const recent = [...data.sessions].sort((a, b) => b.timestamp - a.timestamp).slice(0, 6);
    if (recent.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'wt-empty';
      empty.textContent = 'Nothing logged yet — head to the Log tab to get started.';
      recentCard.appendChild(empty);
    } else {
      recent.forEach(s => {
        const row = document.createElement('div');
        row.className = 'wt-recent-row';
        row.innerHTML = `<span class="wt-recent-row-name">${escapeHtml(s.templateName)}</span><span class="wt-recent-row-date">${new Date(s.timestamp).toLocaleDateString()}</span>`;
        recentCard.appendChild(row);
      });
    }
    wrap.appendChild(recentCard);

    return wrap;
  }

  function stopwatchIsRunning() { return stopwatchStartedAt !== null; }
  function stopwatchCurrentMs() {
    return stopwatchElapsedMs + (stopwatchStartedAt ? Date.now() - stopwatchStartedAt : 0);
  }
  function formatStopwatch(ms) {
    const totalSec = Math.floor(ms / 1000);
    const m = Math.floor(totalSec / 60), s = totalSec % 60;
    const tenths = Math.floor((ms % 1000) / 100);
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0') + '.' + tenths;
  }
  function startStopwatch() {
    stopwatchStartedAt = Date.now();
    clearInterval(stopwatchInterval);
    stopwatchInterval = setInterval(tickStopwatch, 100);
    render();
  }
  function pauseStopwatch() {
    stopwatchElapsedMs = stopwatchCurrentMs();
    stopwatchStartedAt = null;
    clearInterval(stopwatchInterval);
    stopwatchInterval = null;
    render();
  }
  function resetStopwatch() {
    stopwatchElapsedMs = 0;
    stopwatchStartedAt = null;
    clearInterval(stopwatchInterval);
    stopwatchInterval = null;
    render();
  }
  function tickStopwatch() {
    const el = document.getElementById('wt-stopwatch-display');
    if (el) el.textContent = formatStopwatch(stopwatchCurrentMs());
  }

    const wrap = document.createElement('div');

    toggleBtn.className = 'wt-btn wt-btn-primary';
    toggleBtn.textContent = stopwatchIsRunning() ? 'Pause' : 'Start';
    toggleBtn.onclick = () => stopwatchIsRunning() ? pauseStopwatch() : startStopwatch();
    const resetBtn = document.createElement('button');
    resetBtn.className = 'wt-btn wt-btn-ghost';
    resetBtn.textContent = 'Reset';
    resetBtn.onclick = resetStopwatch;
    row.appendChild(toggleBtn);
    row.appendChild(resetBtn);
    wrap.appendChild(row);

    return wrap;
  }

  function startHiit(ownerId, work, rest, rounds) {
    activeHiitOwnerId = ownerId;
    hiitWork = work;
    hiitRest = rest;
    hiitRounds = rounds;
    hiitActive = true;
    hiitRunning = true;
    hiitRound = 1;
    hiitPhase = 'work';
    hiitCompletedRounds = 0;
    hiitPhaseEndAt = Date.now() + hiitWork * 1000;
    clearInterval(hiitInterval);
    hiitInterval = setInterval(tickHiit, 250);
    render();
  }

  function pauseHiit() {
    hiitRemainingOnPause = Math.max(0, hiitPhaseEndAt - Date.now());
    hiitRunning = false;
    clearInterval(hiitInterval);
    hiitInterval = null;
    render();
  }

  function resumeHiit() {
    hiitRunning = true;
    hiitPhaseEndAt = Date.now() + hiitRemainingOnPause;
    clearInterval(hiitInterval);
    hiitInterval = setInterval(tickHiit, 250);
    render();
  }

  function tickHiit() {
    if (!hiitPhaseEndAt) return;
    const remaining = Math.max(0, Math.round((hiitPhaseEndAt - Date.now()) / 1000));
    const el = document.getElementById('wt-hiit-remaining');
    if (el) el.textContent = remaining;
    if (Date.now() >= hiitPhaseEndAt) advanceHiitPhase();
  }

  function advanceHiitPhase() {
    if (hiitPhase === 'work') {
      hiitCompletedRounds = hiitRound;
      hiitPhase = 'rest';
      hiitPhaseEndAt = Date.now() + hiitRest * 1000;
      render();
    } else if (hiitRound >= hiitRounds) {
      finishHiit(true);
    } else {
      hiitRound += 1;
      hiitPhase = 'work';
      hiitPhaseEndAt = Date.now() + hiitWork * 1000;
      render();
    }
  }

  function finishHiit(completed) {
    hiitActive = false;
    hiitRunning = false;
    activeHiitOwnerId = null;
    clearInterval(hiitInterval);
    hiitInterval = null;
    if (hiitCompletedRounds > 0 && data.draft) {
      const summary = 'HIIT: ' + hiitCompletedRounds + '/' + hiitRounds + ' rounds • ' + hiitWork + 's work / ' + hiitRest + 's rest';
      data.draft.notes = data.draft.notes ? data.draft.notes + '\n' + summary : summary;
      scheduleSave();
    }
    showToast(completed ? 'Interval timer complete' : 'Interval timer stopped');
    hiitRound = 1;
    hiitPhase = 'work';
    hiitPhaseEndAt = null;
    hiitRemainingOnPause = null;
    render();
  }

  let clockInterval = null;

  function buildClockWidget() {
    const wrap = document.createElement('div');
    wrap.className = 'wt-card';
    const title = document.createElement('div');
    title.className = 'wt-manage-section-title';
    title.textContent = 'Clock';
    wrap.appendChild(title);

    const face = document.createElement('div');
    face.className = 'wt-clock-face';
    for (let i = 0; i < 12; i++) {
      const tick = document.createElement('div');
      tick.className = 'wt-clock-tick';
      tick.style.transform = 'rotate(' + (i * 30) + 'deg)';
      face.appendChild(tick);
    }
    ['h', 'm', 's'].forEach(h => {
      const hand = document.createElement('div');
      hand.className = 'wt-clock-hand wt-clock-hand-' + h;
      hand.id = 'wt-clock-hand-' + h;
      face.appendChild(hand);
    });
    wrap.appendChild(face);

    function updateClock() {
      const now = new Date();
      const h = now.getHours() % 12, m = now.getMinutes(), s = now.getSeconds();
      const hHand = document.getElementById('wt-clock-hand-h');
      const mHand = document.getElementById('wt-clock-hand-m');
      const sHand = document.getElementById('wt-clock-hand-s');
      if (hHand) hHand.style.transform = 'rotate(' + (h * 30 + m * 0.5) + 'deg)';
      if (mHand) mHand.style.transform = 'rotate(' + (m * 6 + s * 0.1) + 'deg)';
      if (sHand) sHand.style.transform = 'rotate(' + (s * 6) + 'deg)';
    }
    updateClock();
    clearInterval(clockInterval);
    clockInterval = setInterval(updateClock, 1000);

    return wrap;
  }

  let quickTimerRuntime = {};

  function getQTRuntime(id) {
    if (!quickTimerRuntime[id]) quickTimerRuntime[id] = { running: false, endAt: null, remainingMs: null, interval: null };
    return quickTimerRuntime[id];
  }

  function startQuickTimer(instance) {
    const rt = getQTRuntime(instance.id);
    const totalMs = instance.config.seconds * 1000;
    rt.running = true;
    rt.endAt = Date.now() + (rt.remainingMs != null ? rt.remainingMs : totalMs);
    rt.remainingMs = null;
    clearInterval(rt.interval);
    rt.interval = setInterval(() => tickQuickTimer(instance), 250);
    render();
  }

  function pauseQuickTimer(instance) {
    const rt = getQTRuntime(instance.id);
    rt.remainingMs = Math.max(0, rt.endAt - Date.now());
    rt.running = false;
    clearInterval(rt.interval);
    rt.interval = null;
    render();
  }

  function resetQuickTimer(instance) {
    const rt = getQTRuntime(instance.id);
    rt.running = false;
    rt.remainingMs = null;
    rt.endAt = null;
    clearInterval(rt.interval);
    rt.interval = null;
    render();
  }

  function tickQuickTimer(instance) {
    const rt = getQTRuntime(instance.id);
    if (!rt.endAt) return;
    const remaining = Math.max(0, Math.round((rt.endAt - Date.now()) / 1000));
    const el = document.getElementById('wt-qt-remaining-' + instance.id);
    if (el) el.textContent = formatSeconds(remaining);
    if (Date.now() >= rt.endAt) {
      rt.running = false;
      clearInterval(rt.interval);
      rt.interval = null;
      rt.remainingMs = null;
      rt.endAt = null;
      try { if (navigator.vibrate) navigator.vibrate([200, 100, 200]); } catch (e) {}
      showToast(instance.config.label + ' complete');
      render();
    }
  }

  function buildQuickTimerWidget(instance) {
    const wrap = document.createElement('div');
    wrap.className = 'wt-card';
    const title = document.createElement('div');
    title.className = 'wt-manage-section-title';
    title.textContent = instance.config.label;
    wrap.appendChild(title);

    const rt = getQTRuntime(instance.id);
    const remainingSec = rt.running
      ? Math.max(0, Math.round((rt.endAt - Date.now()) / 1000))
      : (rt.remainingMs != null ? Math.round(rt.remainingMs / 1000) : instance.config.seconds);

    const display = document.createElement('div');
    display.id = 'wt-qt-remaining-' + instance.id;
    display.className = 'wt-timer-remaining';
    display.style.textAlign = 'center';

    const row = document.createElement('div');
    row.className = 'wt-timer-grid';
    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'wt-btn wt-btn-primary';
    toggleBtn.textContent = rt.running ? 'Pause' : 'Start';
    toggleBtn.onclick = () => rt.running ? pauseQuickTimer(instance) : startQuickTimer(instance);
    const resetBtn = document.createElement('button');
    resetBtn.className = 'wt-btn wt-btn-ghost';
    resetBtn.textContent = 'Reset';

  function buildSessionExerciseCard(ex, exIdx) {
    const type = ex.type || 'weight';
    const lib = getLibraryEx(ex.exerciseId);
    const lastDisplay = findLastLoggedDisplay(ex.exerciseId);

    const card = document.createElement('div');
    card.className = 'wt-card wt-swipe-content';

    const head = document.createElement('div');
    head.className = 'wt-ex-head';
    head.innerHTML = `<div>
        <div class="wt-ex-name">${escapeHtml(ex.name)}</div>
        <div class="wt-ex-meta">${lib ? escapeHtml(lib.repRange) : ''}</div>
      </div>`;
    const rightWrap = document.createElement('div');
    rightWrap.style.display = 'flex';
    rightWrap.style.alignItems = 'center';
    rightWrap.style.gap = '6px';
    if (lastDisplay) {
      const lastEl = document.createElement('div');
      lastEl.className = 'wt-last';
      lastEl.textContent = 'last: ' + lastDisplay;
      rightWrap.appendChild(lastEl);
    }
    head.appendChild(rightWrap);
    card.appendChild(head);

    if (type === 'checkbox') {
      const checked = ex.sets[0] && ex.sets[0].checked;
      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'wt-btn wt-btn-full ' + (checked ? 'wt-btn-primary' : 'wt-btn-ghost');
      toggleBtn.style.padding = '14px';
      toggleBtn.style.fontSize = '14px';
      toggleBtn.textContent = checked ? '\u2713 Done' : 'Mark as Done';
      toggleBtn.onclick = () => { ex.sets[0].checked = !ex.sets[0].checked; scheduleSave(); render(); };
      card.appendChild(toggleBtn);
    } else if (type === 'custom') {
      const setsWrap = document.createElement('div');
      setsWrap.className = 'wt-sets';
      ex.sets.forEach((s, i) => {
        const swipeWrap = document.createElement('div');
        swipeWrap.className = 'wt-swipe-wrap wt-set-row-swipe';

        const delBtn = document.createElement('button');
        delBtn.className = 'wt-swipe-delete';
        delBtn.textContent = 'Delete';

        const row = document.createElement('div');
        row.className = 'wt-set-row wt-swipe-content';

        const customFieldKeys = ex.fields || ['weight', 'reps'];
        let colCount = 0;
        customFieldKeys.forEach(f => { colCount += f === 'time' ? 2 : 1; });
        row.style.gridTemplateColumns = '24px auto ' + Array(colCount).fill('1fr').join(' ');

        let html = `<div class="wt-set-num">${i+1}</div><div class="wt-drag-handle"><span></span><span></span></div>`;
        customFieldKeys.forEach(f => {
          if (f === 'weight') {
            html += `<div class="wt-field"><input type="number" inputmode="decimal" placeholder="0" value="${s.weight || ''}" data-role="weight" /><span class="wt-unit">lbs</span></div>`;
          } else if (f === 'reps') {
            html += `<div class="wt-field"><input type="number" inputmode="numeric" placeholder="0" value="${s.reps || ''}" data-role="reps" /><span class="wt-unit">reps</span></div>`;
          } else if (f === 'time') {
            const totalSec = s.seconds ? Math.max(0, Math.round(parseFloat(s.seconds) || 0)) : null;
            const minVal = totalSec !== null ? Math.floor(totalSec / 60) : '';
            const secVal = totalSec !== null ? totalSec % 60 : '';
            html += `<div class="wt-field"><input type="number" inputmode="numeric" placeholder="0" value="${minVal}" data-role="min" /><span class="wt-unit">min</span></div>`;
            html += `<div class="wt-field"><input type="number" inputmode="numeric" placeholder="0" value="${secVal}" data-role="sec" /><span class="wt-unit">sec</span></div>`;
          } else if (f === 'distance') {
            html += `<div class="wt-field"><input type="number" inputmode="decimal" placeholder="0.0" value="${s.distance || ''}" data-role="distance" /><span class="wt-unit">mi</span></div>`;
          } else if (f === 'intensity') {
            html += `<div class="wt-intensity-field" data-role="intensity">${[1,2,3,4,5].map(n => `<button type="button" data-val="${n}" class="wt-intensity-btn${s.intensity == n ? ' active' : ''}">${n}</button>`).join('')}</div>`;
          }
        });
        row.innerHTML = html;

        // Only the first set row updates the exercise's remembered default.
        const rememberIfFirst = (field, value) => { if (i === 0) rememberExerciseDefault(ex.exerciseId, field, value); };

        const weightInput = row.querySelector('[data-role="weight"]');
        if (weightInput) {
          weightInput.addEventListener('input', (e) => { ex.sets[i].weight = e.target.value; scheduleSave(); rememberIfFirst('weight', e.target.value); });
          attachNumberSwipe(weightInput.closest('.wt-field'), { step: 2.5, onChange: (v) => { ex.sets[i].weight = v; scheduleSave(); rememberIfFirst('weight', v); } });
        }
        const repsInput = row.querySelector('[data-role="reps"]');
        if (repsInput) {
          repsInput.addEventListener('input', (e) => { ex.sets[i].reps = e.target.value; scheduleSave(); rememberIfFirst('reps', e.target.value); });
          attachNumberSwipe(repsInput.closest('.wt-field'), { step: 1, onChange: (v) => { ex.sets[i].reps = v; scheduleSave(); rememberIfFirst('reps', v); } });
        }
        const distanceInput = row.querySelector('[data-role="distance"]');
        if (distanceInput) {
          distanceInput.addEventListener('input', (e) => { ex.sets[i].distance = e.target.value; scheduleSave(); rememberIfFirst('distance', e.target.value); });
          attachNumberSwipe(distanceInput.closest('.wt-field'), { step: 0.1, onChange: (v) => { ex.sets[i].distance = v; scheduleSave(); rememberIfFirst('distance', v); } });
        }
        const minInput = row.querySelector('[data-role="min"]');
        const secInput = row.querySelector('[data-role="sec"]');
        if (minInput && secInput) {
          const commitTime = () => {
            const m = parseInt(minInput.value) || 0;
            const sc = parseInt(secInput.value) || 0;
            ex.sets[i].seconds = m * 60 + sc;
            scheduleSave();
            rememberIfFirst('seconds', m * 60 + sc);
          };
          minInput.addEventListener('input', commitTime);
          secInput.addEventListener('input', commitTime);
          attachNumberSwipe(minInput.closest('.wt-field'), { step: 1, onChange: (v) => { const sec = (parseInt(v) || 0) * 60 + (parseInt(secInput.value) || 0); ex.sets[i].seconds = sec; scheduleSave(); rememberIfFirst('seconds', sec); } });
          attachNumberSwipe(secInput.closest('.wt-field'), { step: 1, onChange: (v) => { const sec = (parseInt(minInput.value) || 0) * 60 + (parseInt(v) || 0); ex.sets[i].seconds = sec; scheduleSave(); rememberIfFirst('seconds', sec); } });
        }
        const intensityField = row.querySelector('[data-role="intensity"]');
        if (intensityField) {
          intensityField.querySelectorAll('button').forEach(btn => {
            btn.onclick = () => {
              ex.sets[i].intensity = parseInt(btn.dataset.val);
              scheduleSave();
              rememberIfFirst('intensity', ex.sets[i].intensity);
              render();
            };
          });
        }

        attachSwipe(row, { handleSelector: '.wt-drag-handle', wrapEl: swipeWrap, reverse: true });
        delBtn.onclick = () => { ex.sets.splice(i, 1); scheduleSave(); render(); };

        swipeWrap.appendChild(delBtn);
        swipeWrap.appendChild(row);
        setsWrap.appendChild(swipeWrap);
      });
      card.appendChild(setsWrap);

      const addSetBtn = document.createElement('button');
      addSetBtn.className = 'wt-addset-btn';
      addSetBtn.textContent = '+ Add Set';
      addSetBtn.onclick = () => { ex.sets.push({ weight: '', reps: '', seconds: '', distance: '', checked: false, intensity: '' }); scheduleSave(); render(); };
      card.appendChild(addSetBtn);
    } else {
      card.appendChild(buildSetGroups(ex, type));
    }

    const outerSwipe = document.createElement('div');
    outerSwipe.className = 'wt-swipe-wrap';
    const cardDeleteBtn = document.createElement('button');
    cardDeleteBtn.className = 'wt-swipe-delete';
    cardDeleteBtn.textContent = 'Delete';
    cardDeleteBtn.onclick = () => removeExerciseFromSession(exIdx);
    attachSwipe(card, { excludeSelector: '.wt-set-row-swipe', wrapEl: outerSwipe });
    outerSwipe.appendChild(cardDeleteBtn);
    outerSwipe.appendChild(card);

    return outerSwipe;
  }

  function buildLibraryPicker(available, onAdd) {
    const wrap = document.createElement('div');
    const CATEGORY_LABELS = { strength: 'Strength', cardio: 'Cardio', warmup: 'Warm Up' };
    const byCategory = {};
    available.forEach(ex => {
      const cat = ex.category || 'strength';
      (byCategory[cat] || (byCategory[cat] = [])).push(ex);
    });
    const catKeys = Object.keys(byCategory);

    const catSlot = document.createElement('div');
    const exSlot = document.createElement('div');
    let exWheel = null;

    function buildExWheel(catKey) {
      exSlot.innerHTML = '';
      exWheel = buildWheelPicker(byCategory[catKey].map(ex => ({ label: ex.name, value: ex.id })));
      exSlot.appendChild(exWheel);
    }

    if (catKeys.length > 1) {
      const catLabel = document.createElement('label');
      catLabel.textContent = 'Category';
      wrap.appendChild(catLabel);
      const catWheel = buildWheelPicker(catKeys.map(k => ({ label: CATEGORY_LABELS[k] || k, value: k })), { onChange: (val) => buildExWheel(val) });
      catSlot.appendChild(catWheel);
      wrap.appendChild(catSlot);
    }

    const exLabel = document.createElement('label');
    exLabel.textContent = 'Exercise';
    wrap.appendChild(exLabel);
    buildExWheel(catKeys[0]);
    wrap.appendChild(exSlot);

    const addBtn = document.createElement('button');
    addBtn.className = 'wt-btn wt-btn-primary wt-btn-full';
    addBtn.style.marginTop = '10px';
    addBtn.textContent = 'Add';
    addBtn.onclick = () => { if (exWheel) onAdd(exWheel.getValue()); };
    wrap.appendChild(addBtn);

    return wrap;
  }

  function buildNewExerciseForm(onSave, onCancel, opts) {
    opts = opts || {};
    const initial = opts.initial || { name: '', type: 'weight', sets: 3, repRange: '8-12' };
    let customFields = (initial.fields && initial.fields.slice()) || ['weight', 'reps'];
    let selectedMuscles = (initial.load && Object.keys(initial.load)) || [];

    const form = document.createElement('div');
    form.className = 'wt-add-form';
    form.innerHTML = `
      <label>Exercise name</label>
      <input type="text" id="nf-name" placeholder="e.g. Bulgarian Split Squat" value="${escapeHtml(initial.name)}" />
      <label>Type</label>
      <select id="nf-type">
        <option value="weight">Weighted (weight + reps)</option>
        <option value="bodyweight">Bodyweight (reps only)</option>
        <option value="timed">Timed (duration only)</option>
        <option value="checkbox">Checkmark (done / not done)</option>
        <option value="custom">Custom (choose your own fields)</option>
      </select>
      <div class="wt-form-row" id="nf-details-row">
        <div><label>Sets</label><input type="number" id="nf-sets" value="${initial.sets}" /></div>
        <div><label>Target range</label><input type="text" id="nf-reps" value="${escapeHtml(initial.repRange)}" /></div>
      </div>
      <div id="nf-custom-row" style="display:none;">
        <button type="button" class="wt-btn wt-btn-ghost wt-btn-sm" id="nf-cardio-preset" style="margin-bottom:10px;">Use Cardio Preset (Time + Distance + Intensity)</button>
        <label>Fields (tap to add, in the order you want)</label>
        <div id="nf-field-add-row" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;"></div>
        <label>Selected fields, in order</label>
        <div id="nf-field-chip-row" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;"></div>
      </div>
      <div id="nf-muscle-row" style="display:none;">
        <label>Muscle groups (optional — powers Gym Suggestions)</label>
        <div id="nf-muscle-btn-row" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;"></div>
      </div>
    `;
    const detailsRow = form.querySelector('#nf-details-row');
    const customRow = form.querySelector('#nf-custom-row');
    const addRow = form.querySelector('#nf-field-add-row');
    const chipRow = form.querySelector('#nf-field-chip-row');
    const muscleRow = form.querySelector('#nf-muscle-row');
    const muscleBtnRow = form.querySelector('#nf-muscle-btn-row');
    const typeSelect = form.querySelector('#nf-type');
    typeSelect.value = initial.type || 'weight';

    function renderMuscleButtons() {
      muscleBtnRow.innerHTML = '';
      BUCKETS.forEach(b => {
        const active = selectedMuscles.includes(b);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'wt-btn wt-btn-sm ' + (active ? 'wt-btn-selected' : 'wt-btn-ghost');
        btn.textContent = b.charAt(0).toUpperCase() + b.slice(1);
        btn.onclick = () => {
          selectedMuscles = active ? selectedMuscles.filter(x => x !== b) : selectedMuscles.concat(b);
          renderMuscleButtons();
        };
        muscleBtnRow.appendChild(btn);
      });
    }
    renderMuscleButtons();

    function renderFieldPicker() {
      addRow.innerHTML = '';
      Object.keys(FIELD_TYPES).forEach(key => {
        if (customFields.includes(key)) return;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'wt-btn wt-btn-ghost wt-btn-sm';
        btn.textContent = '+ ' + FIELD_TYPES[key].label;
        btn.onclick = () => { customFields.push(key); renderFieldPicker(); };
        addRow.appendChild(btn);
      });
      chipRow.innerHTML = '';
      if (customFields.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'wt-sub';
        empty.textContent = 'No fields selected yet.';
        chipRow.appendChild(empty);
      } else {
        customFields.forEach(key => {
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'wt-btn wt-btn-selected wt-btn-sm';
          chip.textContent = FIELD_TYPES[key].label + ' ×';
          chip.onclick = () => { customFields = customFields.filter(f => f !== key); renderFieldPicker(); };
          chipRow.appendChild(chip);
        });
      }
    }

    function updateVisibility() {
      const isCheckbox = typeSelect.value === 'checkbox';
      const isCustom = typeSelect.value === 'custom';
      detailsRow.style.display = isCheckbox ? 'none' : 'flex';
      customRow.style.display = isCustom ? 'block' : 'none';
      muscleRow.style.display = isCheckbox ? 'none' : 'block';
      if (isCustom) renderFieldPicker();
    }
    updateVisibility();
    typeSelect.addEventListener('change', updateVisibility);

    form.querySelector('#nf-cardio-preset').onclick = () => {
      customFields = ['time', 'distance', 'intensity'];
      renderFieldPicker();
      const nameInput = form.querySelector('#nf-name');
      if (!nameInput.value.trim()) nameInput.value = 'Cardio';
    };

    const row = document.createElement('div');
    row.className = 'wt-actions-row';
    const saveBtn = document.createElement('button');
    saveBtn.className = 'wt-btn wt-btn-primary';
    saveBtn.textContent = opts.saveLabel || 'Add';
    saveBtn.onclick = () => {
      const name = form.querySelector('#nf-name').value.trim();
      if (!name) return;
      const type = typeSelect.value;
      if (type === 'custom' && customFields.length === 0) { showToast('Pick at least one field'); return; }
      onSave({
        name,
        type,
        sets: type === 'checkbox' ? 1 : (parseInt(form.querySelector('#nf-sets').value) || 3),
        repRange: type === 'checkbox' ? '' : (form.querySelector('#nf-reps').value.trim() || '8-12'),
        fields: type === 'custom' ? customFields.slice() : undefined,
        load: (type !== 'checkbox' && selectedMuscles.length) ? Object.fromEntries(selectedMuscles.map(b => [b, 0.6])) : undefined
      });
    };
    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'wt-btn wt-btn-ghost';
    cancelBtn.textContent = 'Cancel';
    cancelBtn.onclick = onCancel;
    row.appendChild(saveBtn);
    row.appendChild(cancelBtn);
    form.appendChild(row);
    return form;
  }

      });
      const row = document.createElement('div');
      row.className = 'wt-actions-row';

  function computeE1RM(weight, reps) {
    return weight * (1 + reps / 30);
  }

  // ---------- Gym suggestion engine ----------
  // Pure functions reading data.library / data.sessions. An exercise with no `load`
  // contributes nothing and is simply excluded from the candidate pool — never throws.

  const BUCKETS = ['chest', 'back', 'shoulders', 'biceps', 'triceps', 'quads', 'hamstrings', 'glutes', 'core', 'calves', 'cardio'];
  const SUGGESTION_WEIGHTS = { fatigue: 2.5, weekly: 1.5, variety: 0.8, focus: 2.0 };

  const WORKOUT_FOCUS_OPTIONS = [
    { key: 'fullbody', label: 'Full Body', buckets: null },
    { key: 'push', label: 'Push', buckets: ['chest', 'shoulders', 'triceps'] },
    { key: 'pull', label: 'Pull', buckets: ['back', 'biceps'] },
    { key: 'legs', label: 'Legs', buckets: ['quads', 'hamstrings', 'glutes', 'calves'] }
  ];

  function averageLoggedIntensity(ex) {
    const vals = ex.sets.map(s => +s.intensity).filter(v => v > 0);
    if (!vals.length) return null;
    return (vals.reduce((a, b) => a + b, 0) / vals.length) / 5;
  }

  function computeSessionFatigue(draftExercises) {
    const fatigue = Object.fromEntries(BUCKETS.map(b => [b, 0]));
    const DECAY = 0.55;
    draftExercises.forEach(ex => {
      const entry = getLibraryEx(ex.exerciseId);
      if (!entry || !entry.load) return;
      BUCKETS.forEach(b => { fatigue[b] *= DECAY; });
      const factor = averageLoggedIntensity(ex);
      const f = factor === null ? 1 : factor;
      Object.keys(entry.load).forEach(b => { fatigue[b] = (fatigue[b] || 0) + entry.load[b] * f; });
    });
    return fatigue;
  }

  function computeRecentLoad(asOf, halfLifeDays) {
    asOf = asOf || Date.now();
    halfLifeDays = halfLifeDays || 2;
    const load = Object.fromEntries(BUCKETS.map(b => [b, 0]));
    data.sessions.forEach(session => {
      const daysAgo = (asOf - session.timestamp) / 86400000;
      if (daysAgo > 7) return;
      const decay = Math.pow(0.5, daysAgo / halfLifeDays);
      session.exercises.forEach(ex => {
        const entry = getLibraryEx(ex.exerciseId);
        if (!entry || !entry.load) return;
        const factor = averageLoggedIntensity(ex);
        const f = factor === null ? 1 : factor;
        Object.keys(entry.load).forEach(b => { load[b] = (load[b] || 0) + entry.load[b] * f * decay; });
      });
    });
    return load;
  }

  function computeFamilyLastSeen(asOf) {
    asOf = asOf || Date.now();
    const lastSeen = {};
    data.sessions.forEach(session => {
      const daysAgo = (asOf - session.timestamp) / 86400000;
      session.exercises.forEach(ex => {
        if (!ex.sets.some(s => setHasData(ex, s))) return;
        const entry = getLibraryEx(ex.exerciseId);
        const key = (entry && entry.family) || ex.exerciseId;
        if (lastSeen[key] === undefined || daysAgo < lastSeen[key]) lastSeen[key] = daysAgo;
      });
    });
    return lastSeen;
  }

  function scoreCandidate(entry, ctx) {
    const loadKeys = Object.keys(entry.load || {});
    let fatigueLoad = 0, weeklyLoad = 0, focusScore = 0;
    loadKeys.forEach(b => {
      fatigueLoad += entry.load[b] * (ctx.sessionFatigue[b] || 0);
      weeklyLoad += entry.load[b] * (ctx.recentLoad[b] || 0);
      if (ctx.focusBuckets && ctx.focusBuckets.includes(b)) focusScore += entry.load[b];
    });
    const key = entry.family || entry.id;
    const seen = ctx.familyLastSeen[key];
    const variety = seen === undefined ? 5 : Math.min(seen, 5);
    const focusWeight = ctx.focusWeight === undefined ? 1 : ctx.focusWeight;
    const total = SUGGESTION_WEIGHTS.fatigue * -fatigueLoad
      + SUGGESTION_WEIGHTS.weekly * -weeklyLoad
      + SUGGESTION_WEIGHTS.variety * variety
      + SUGGESTION_WEIGHTS.focus * focusScore * focusWeight;
    return { total, fatigueLoad, weeklyLoad, variety, focusScore, hasLoad: loadKeys.length > 0 };
  }

  function suggestionReason(scored, avg) {
    if (!scored.hasLoad) return 'Not tracked by muscle group yet';
    const edges = [
      { val: avg.fatigueLoad - scored.fatigueLoad, text: 'Lower fatigue than the field' },
      { val: avg.weeklyLoad - scored.weeklyLoad, text: 'Lighter on recent load' },
      { val: scored.variety - avg.variety, text: scored.variety >= 5 ? 'Not done recently' : 'Good variety pick' },
      { val: scored.focusScore - avg.focusScore, text: 'Matches your focus' }
    ];
    edges.sort((a, b) => b.val - a.val);
    if (edges[0].val <= 0) return 'Good place to start';
    return edges[0].text;
  }

  function computeGymSuggestions(draftExercises, count, focusKey) {
    count = count || 3;
    if (!data.settings || !data.settings.gymSuggestions) return [];
    const loggedIds = new Set(draftExercises.map(ex => ex.exerciseId));
    const pool = data.library.filter(e => (e.category || 'strength') === 'strength' && !loggedIds.has(e.id));
    if (pool.length === 0) return [];

    const sessionFatigue = computeSessionFatigue(draftExercises);
    const recentLoad = computeRecentLoad();
    const familyLastSeen = computeFamilyLastSeen();
    const focusOpt = WORKOUT_FOCUS_OPTIONS.find(o => o.key === focusKey);
    const focusBuckets = focusOpt ? focusOpt.buckets : null;
    // The chosen split matters most when there's no real fatigue signal yet from this
    // session (start of workout) and fades out as actual logged sets accumulate.
    const totalSessionFatigue = Object.values(sessionFatigue).reduce((a, b) => a + b, 0);
    const focusWeight = Math.exp(-totalSessionFatigue);
    const ctx = { sessionFatigue, recentLoad, familyLastSeen, focusBuckets, focusWeight };

    const scored = pool.map(entry => ({ entry, ...scoreCandidate(entry, ctx) }));
    const tracked = scored.filter(c => c.hasLoad);
    const avg = tracked.length ? {
      fatigueLoad: tracked.reduce((s, c) => s + c.fatigueLoad, 0) / tracked.length,
      weeklyLoad: tracked.reduce((s, c) => s + c.weeklyLoad, 0) / tracked.length,
      variety: tracked.reduce((s, c) => s + c.variety, 0) / tracked.length,
      focusScore: tracked.reduce((s, c) => s + c.focusScore, 0) / tracked.length
    } : { fatigueLoad: 0, weeklyLoad: 0, variety: 2.5, focusScore: 0 };

    scored.sort((a, b) => b.total - a.total);
    return scored.slice(0, count).map(c => ({ entry: c.entry, reason: suggestionReason(c, avg) }));
  }

  function buildSimpleBarChart(points, valueFormatter) {
    const chartWrap = document.createElement('div');

      col.className = 'wt-chart-col';

        <div class="wt-chart-bar" style="height:${heightPx}px;"></div>
