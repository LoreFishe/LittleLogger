  function buildDualAxisChart(points) {
    const colW = 56;
    const chartW = Math.max(points.length * colW, colW);
    const chartH = 170;
    const barMaxH = 100;
    const topPad = 24;
    const bottomPad = 24;
    const maxWeight = Math.max(...points.map(p => p.weight), 1);
    const maxReps = Math.max(...points.map(p => p.reps), 1);

    let bars = '', lineCoords = [], circles = '', dateLabels = '', weightLabels = '', repLabels = '';
    points.forEach((p, i) => {
      const cx = i * colW + colW / 2;
      const barH = (p.weight / maxWeight) * barMaxH;
      const barY = chartH - bottomPad - barH;
      bars += `<rect x="${cx - 12}" y="${barY}" width="24" height="${barH}" rx="3" fill="var(--accent)" />`;
      weightLabels += `<text x="${cx}" y="${barY - 6}" font-size="10" fill="var(--accent)" text-anchor="middle">${p.weight}</text>`;

      const repY = topPad + (1 - p.reps / maxReps) * (barMaxH - 10);
      lineCoords.push(cx + ',' + repY);
      circles += `<circle cx="${cx}" cy="${repY}" r="3.5" fill="var(--green)" />`;
      repLabels += `<text x="${cx}" y="${repY - 8}" font-size="10" fill="var(--green)" text-anchor="middle">${p.reps}</text>`;

      dateLabels += `<text x="${cx}" y="${chartH - 6}" font-size="9" fill="var(--chalk-dim)" text-anchor="middle">${new Date(p.date).toLocaleDateString(undefined,{month:'numeric',day:'numeric'})}</text>`;
    });

    const svg = `
      <svg viewBox="0 0 ${chartW} ${chartH}" width="${chartW}" height="${chartH}" xmlns="http://www.w3.org/2000/svg">
        ${bars}
        <polyline points="${lineCoords.join(' ')}" fill="none" stroke="var(--green)" stroke-width="2" />
        ${circles}
        ${weightLabels}
        ${repLabels}
        ${dateLabels}
      </svg>
    `;

    const wrap = document.createElement('div');
    wrap.className = 'wt-chart-wrap';
    wrap.innerHTML = svg;

    const legend = document.createElement('div');
    legend.style.cssText = 'display:flex; gap:16px; margin-top:8px; font-size:11px; color:var(--chalk-dim);';
    legend.innerHTML = `
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;background:var(--accent);border-radius:2px;display:inline-block;"></span>Weight (lb)</span>
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;background:var(--green);border-radius:50%;display:inline-block;"></span>Reps</span>
    `;

    const outer = document.createElement('div');
    outer.appendChild(wrap);
    outer.appendChild(legend);
    return outer;
  }

  function buildTrendsPage(embedded) {
    const wrap = document.createElement('div');
    if (!embedded) {
      const back = document.createElement('button');
      back.className = 'wt-back-btn';
      back.textContent = '\u2190 Back';
      back.onclick = () => { view = 'home'; render(); };
      wrap.appendChild(back);
    }

    if (data.sessions.length === 0) {
      const e = document.createElement('div');
      e.className = 'wt-empty';
      e.textContent = 'Log a few sessions to see trends here.';
      wrap.appendChild(e);
      return wrap;
    }

    const loggedExIds = new Set();
    data.sessions.forEach(s => s.exercises.forEach(ex => { if (ex.sets.some(x => setHasData(ex, x))) loggedExIds.add(ex.exerciseId); }));
    const options = data.library.filter(e => loggedExIds.has(e.id) && (e.type || 'weight') !== 'checkbox');

    if (options.length === 0) {
      wrap.innerHTML += '<div class="wt-empty">Log a few sessions to see trends here.</div>';
      return wrap;
    }

    if (!trendsExerciseId || !loggedExIds.has(trendsExerciseId)) trendsExerciseId = options[0].id;

    const trendsWheel = buildWheelPicker(
      options.map(ex => ({ label: ex.name, value: ex.id })),
      { selectedIndex: Math.max(0, options.findIndex(e => e.id === trendsExerciseId)), onChange: (val) => { trendsExerciseId = val; render(); } }
    );
    wrap.appendChild(trendsWheel);

    const type = (getLibraryEx(trendsExerciseId) || {}).type || 'weight';

    if (type === 'custom') {
      const lib = getLibraryEx(trendsExerciseId);
      const fields = (lib && lib.fields) || [];
      const relevantSessions = [...data.sessions].sort((a, b) => a.timestamp - b.timestamp)
        .map(s => {
          const ex = s.exercises.find(e => e.exerciseId === trendsExerciseId);
          if (!ex || !ex.sets.some(x => setHasData(ex, x))) return null;
          return { timestamp: s.timestamp, ex };
        })
        .filter(Boolean);

      if (relevantSessions.length === 0) {
        wrap.innerHTML += '<div class="wt-empty">No data logged for this exercise yet.</div>';
        return wrap;
      }

      const FIELD_CHART_META = {
        weight: { label: 'Weight', bestIsMax: true, format: v => (Math.round(v * 10) / 10) + ' lb' },
        reps: { label: 'Reps', bestIsMax: true, format: v => Math.round(v) + ' reps' },
        time: { label: 'Duration', bestIsMax: true, format: v => formatSeconds(v) },
        distance: { label: 'Distance', bestIsMax: true, format: v => (Math.round(v * 100) / 100) + ' mi' },
        intensity: { label: 'Intensity', bestIsMax: false, format: v => (Math.round(v * 10) / 10) + '/5' }
      };

      let chartedAny = false;
      fields.forEach(f => {
        const meta = FIELD_CHART_META[f];
        if (!meta) return;
        const points = relevantSessions.map(({ timestamp, ex }) => {
          const vals = ex.sets.map(s => fieldValueOf(f, s)).filter(v => v !== '' && v !== null && v !== undefined).map(Number).filter(v => !isNaN(v));
          if (vals.length === 0) return null;
          const val = meta.bestIsMax === false ? (vals.reduce((a, b) => a + b, 0) / vals.length) : Math.max(...vals);
          return { date: timestamp, val };
        }).filter(Boolean);
        if (points.length === 0) return;
        chartedAny = true;

        const lastVal = points[points.length - 1].val;
        const statRow = document.createElement('div');
        statRow.className = 'wt-stat-row';
        if (meta.bestIsMax) {
          const bestVal = Math.max(...points.map(p => p.val));
          statRow.innerHTML = `
            <div><div class="wt-stat-val">${meta.format(lastVal)}</div><div class="wt-stat-label">Last</div></div>
            <div><div class="wt-stat-val">${meta.format(bestVal)}</div><div class="wt-stat-label">Best</div></div>
            <div><div class="wt-stat-val">${points.length}</div><div class="wt-stat-label">Sessions</div></div>
          `;
        } else {
          const avgVal = points.reduce((s, p) => s + p.val, 0) / points.length;
          statRow.innerHTML = `
            <div><div class="wt-stat-val">${meta.format(lastVal)}</div><div class="wt-stat-label">Last</div></div>
            <div><div class="wt-stat-val">${meta.format(avgVal)}</div><div class="wt-stat-label">Average</div></div>
            <div><div class="wt-stat-val">${points.length}</div><div class="wt-stat-label">Sessions</div></div>
          `;
        }
        wrap.appendChild(statRow);
        wrap.appendChild(buildChartTitle(meta.label + ' Per Session'));
        wrap.appendChild(buildSimpleBarChart(points.slice(-10), v => meta.format(v)));
      });

      if (!chartedAny) wrap.innerHTML += '<div class="wt-empty">No data logged for this exercise yet.</div>';
      return wrap;
    }

    if (type !== 'weight') {
      const points = [];
      [...data.sessions].sort((a,b) => a.timestamp - b.timestamp).forEach(s => {
        const ex = s.exercises.find(e => e.exerciseId === trendsExerciseId);
        if (!ex || !ex.sets.some(x => setHasData(ex, x))) return;
        const val = type === 'timed'
          ? Math.max(...ex.sets.filter(x=>x.seconds).map(x=>+x.seconds))
          : Math.max(...ex.sets.filter(x=>x.reps).map(x=>+x.reps));
        points.push({ date: s.timestamp, val });
      });
      if (points.length === 0) {
        wrap.innerHTML += '<div class="wt-empty">No data logged for this exercise yet.</div>';
        return wrap;
      }
      const bestVal = Math.max(...points.map(p => p.val));
      const lastVal = points[points.length - 1].val;
      const statRow = document.createElement('div');
      statRow.className = 'wt-stat-row';
      statRow.innerHTML = `
        <div><div class="wt-stat-val">${type==='timed' ? formatSeconds(lastVal) : lastVal}</div><div class="wt-stat-label">Last</div></div>
        <div><div class="wt-stat-val">${type==='timed' ? formatSeconds(bestVal) : bestVal}</div><div class="wt-stat-label">Best</div></div>
        <div><div class="wt-stat-val">${points.length}</div><div class="wt-stat-label">Sessions</div></div>
      `;
      wrap.appendChild(statRow);
      wrap.appendChild(buildChartTitle(type === 'timed' ? 'Duration Per Session (sec)' : 'Reps Per Session'));
      wrap.appendChild(buildSimpleBarChart(points.slice(-10), v => type === 'timed' ? formatSeconds(v) : v));
      return wrap;
    }

    const sessionPoints = [];
    [...data.sessions].sort((a,b) => a.timestamp - b.timestamp).forEach(s => {
      const ex = s.exercises.find(e => e.exerciseId === trendsExerciseId);
      if (!ex || !ex.sets.some(x => setHasData(ex, x))) return;
      const validSets = ex.sets.filter(x => x.weight && x.reps);
      if (validSets.length === 0) return;
      const topSet = validSets.reduce((a,b) => (+b.weight > +a.weight ? b : a));
      const e1rm = Math.max(...validSets.map(s2 => computeE1RM(+s2.weight, +s2.reps)));
      const volume = validSets.reduce((sum, s2) => sum + (+s2.weight * +s2.reps), 0);
      sessionPoints.push({ date: s.timestamp, weight: +topSet.weight, reps: +topSet.reps, e1rm: Math.round(e1rm), volume: Math.round(volume) });
    });

    if (sessionPoints.length === 0) {
      wrap.innerHTML += '<div class="wt-empty">No data logged for this exercise yet.</div>';
      return wrap;
    }

    const prWeight = Math.max(...sessionPoints.map(p => p.weight));
    const prE1RM = Math.max(...sessionPoints.map(p => p.e1rm));
    const prVolume = Math.max(...sessionPoints.map(p => p.volume));

    const statRow = document.createElement('div');
    statRow.className = 'wt-stat-row';
    statRow.innerHTML = `
      <div><div class="wt-stat-val">${prWeight} lb</div><div class="wt-stat-label">Max Weight PR</div></div>
      <div><div class="wt-stat-val">${prE1RM} lb</div><div class="wt-stat-label">Best e1RM</div></div>
      <div><div class="wt-stat-val">${prVolume} lb</div><div class="wt-stat-label">Total Volume PR</div></div>
    `;
    wrap.appendChild(statRow);

    const recent = sessionPoints.slice(-8);
    wrap.appendChild(buildChartTitle('Weight & Reps Per Session'));
    wrap.appendChild(buildDualAxisChart(recent));

    wrap.appendChild(buildChartTitle('Estimated 1-Rep Max (e1RM)'));
    wrap.appendChild(buildSimpleBarChart(sessionPoints.slice(-10).map(p => ({ date: p.date, val: p.e1rm })), v => v + ' lb'));

    wrap.appendChild(buildChartTitle('Total Volume Per Session'));
    wrap.appendChild(buildSimpleBarChart(sessionPoints.slice(-10).map(p => ({ date: p.date, val: p.volume })), v => v));

    const note = document.createElement('div');
    note.className = 'wt-sub';
    note.style.marginTop = '14px';
    note.textContent = 'e1RM is an estimate (Epley formula) based on your heaviest set each session, not a measured max. "Total Volume PR" is your best single-session total (weight \u00d7 reps summed across sets), not a lifetime total.';
    wrap.appendChild(note);

    return wrap;
  }

  function buildCalendarPage(embedded) {
    const wrap = document.createElement('div');
    if (!embedded) {
      const back = document.createElement('button');
      back.className = 'wt-back-btn';
      back.textContent = '\u2190 Back';
      back.onclick = () => { view = 'home'; render(); };
      wrap.appendChild(back);
    }

    const base = new Date();
    base.setDate(1);
    base.setMonth(base.getMonth() + calendarMonthOffset);
    const year = base.getFullYear(), month = base.getMonth();

    const header = document.createElement('div');
    header.className = 'wt-cal-header';
    const prevBtn = document.createElement('button');
    prevBtn.className = 'wt-cal-nav';
    prevBtn.textContent = '\u2190';
    prevBtn.onclick = () => { calendarMonthOffset -= 1; selectedCalendarDay = null; render(); };
    const nextBtn = document.createElement('button');
    nextBtn.className = 'wt-cal-nav';
    nextBtn.textContent = '\u2192';
    nextBtn.onclick = () => { calendarMonthOffset += 1; selectedCalendarDay = null; render(); };
    const title = document.createElement('div');
    title.className = 'wt-cal-title';
    title.textContent = base.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
    header.appendChild(prevBtn);
    header.appendChild(title);
    header.appendChild(nextBtn);
    wrap.appendChild(header);

    const sessionsByDay = {};
    data.sessions.forEach(s => {
      const d = new Date(s.timestamp);
      const key = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
      if (!sessionsByDay[key]) sessionsByDay[key] = [];
      sessionsByDay[key].push(s);
    });

    const grid = document.createElement('div');
    grid.className = 'wt-cal-grid';
    ['S','M','T','W','T','F','S'].forEach(d => {
      const el = document.createElement('div');
      el.className = 'wt-cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'wt-cal-day empty';
      grid.appendChild(el);
    }
    for (let day = 1; day <= daysInMonth; day++) {
      const key = year + '-' + month + '-' + day;
      const daySessions = sessionsByDay[key];
      const hasSession = !!daySessions;
      const el = document.createElement('div');
      el.className = 'wt-cal-day' + (hasSession ? ' has-session' : '');
      el.textContent = day;
      if (hasSession) {
        el.onclick = () => { selectedCalendarDay = key; render(); };
        if (selectedCalendarDay === key) el.style.outline = '2px solid var(--accent)';
        const colors = [];
        daySessions.forEach(s => {
          const color = getTemplateColor(data.templates[s.templateKey]);
          if (!colors.includes(color)) colors.push(color);
        });
        const dotsWrap = document.createElement('div');
        dotsWrap.className = 'wt-cal-dots';
        colors.slice(0, 3).forEach(color => {
          const dot = document.createElement('span');
          dot.className = 'wt-cal-dot';
          dot.style.background = color;
          dotsWrap.appendChild(dot);
        });
        el.appendChild(dotsWrap);
      }
      grid.appendChild(el);
    }
    wrap.appendChild(grid);

    if (selectedCalendarDay && sessionsByDay[selectedCalendarDay]) {
      const listWrap = document.createElement('div');
      listWrap.className = 'wt-cal-selected-list';
      sessionsByDay[selectedCalendarDay].forEach(s => {
        const row = document.createElement('div');
        row.className = 'wt-card';
        row.innerHTML = `<div class="wt-ex-name">${escapeHtml(s.templateName)}</div><div class="wt-ex-meta">${new Date(s.timestamp).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}</div>`;
        listWrap.appendChild(row);
      });
      wrap.appendChild(listWrap);
    }

    return wrap;
  }


  loadData();
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
